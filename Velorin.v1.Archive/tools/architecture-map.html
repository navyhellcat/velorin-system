<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velorin Architecture Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#0d1117;color:#e6edf3;min-height:100vh;padding:24px}
h1{font-size:18px;font-weight:600;color:#e6edf3;margin-bottom:4px}
.subtitle{font-size:12px;color:#7d8590;margin-bottom:16px}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls button{background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;transition:background .15s}
.controls button:hover{background:#30363d}
.controls .count{font-size:11px;color:#7d8590;margin-left:auto}
.status{font-size:11px;color:#7d8590;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.status .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status .dot.ok{background:#3fb950}
.status .dot.loading{background:#d29922}
.status .dot.err{background:#f85149}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:20px}
.panel-head{font-size:13px;font-weight:600;color:#e6edf3;padding:12px 16px;background:#1c2128;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:8px}
.panel-body{padding:12px;overflow-x:auto}
.folder{margin:1px 0}
.folder-toggle{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:5px;cursor:pointer;color:#e6edf3;font-weight:600;font-size:12px;border:none;background:none;width:100%;text-align:left;user-select:none}
.folder-toggle:hover{background:#1c2128}
.folder-toggle .arrow{display:inline-block;width:12px;font-size:10px;color:#7d8590;transition:transform .15s;flex-shrink:0}
.folder-toggle.collapsed .arrow{transform:rotate(-90deg)}
.children{padding-left:18px;border-left:1px solid #21262d;margin-left:11px;margin-top:1px;margin-bottom:2px}
.children.hidden{display:none}
.file{display:flex;align-items:center;gap:7px;padding:3px 8px;border-radius:4px;color:#8b949e;font-size:11px}
.file:hover{background:#1c2128;color:#e6edf3}
.file a{color:inherit;text-decoration:none}
.file a:hover{color:#58a6ff;text-decoration:underline}
svg.ficon{width:14px;height:14px;flex-shrink:0}
.updated{font-size:10px;color:#7d8590;margin-top:20px;text-align:right}
.error-msg{color:#f85149;font-size:12px;padding:16px}
</style>
</head>
<body>

<h1>Velorin — Architecture Map</h1>
<p class="subtitle">Live from GitHub — navyhellcat/velorin-system</p>

<div class="controls">
  <button onclick="expandAll()">Expand All</button>
  <button onclick="collapseAll()">Collapse All</button>
  <button onclick="fetchTree()">Refresh</button>
  <span class="count" id="countDisplay"></span>
</div>

<div class="status" id="statusLine">
  <span class="dot loading"></span> Loading...
</div>

<div class="panel">
  <div class="panel-head">
    <svg style="width:14px;height:14px;flex-shrink:0" viewBox="0 0 16 16" fill="#e6edf3"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    navyhellcat/velorin-system
  </div>
  <div class="panel-body" id="treeContainer">
    <div style="color:#7d8590;font-size:12px;padding:8px">Loading repository tree...</div>
  </div>
</div>

<p class="updated" id="updatedLine"></p>

<script>
const REPO = 'navyhellcat/velorin-system';
const BRANCH = 'main';
const API_BASE = 'https://api.github.com';

const FOLDER_SVG = '<svg class="ficon" viewBox="0 0 16 16"><path d="M2 4a1 1 0 011-1h4l1 2h5a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V4z" fill="#EF9F27" stroke="#BA7517" stroke-width="0.5"/></svg>';
const FILE_SVG = '<svg class="ficon" viewBox="0 0 16 16"><path d="M3.75 1.5a.25.25 0 00-.25.25v12.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25V6H9.75A1.75 1.75 0 018 4.25V1.5H3.75zm5.75.56v2.19c0 .138.112.25.25.25h2.19L9.5 2.06zM2 1.75C2 .784 2.784 0 3.75 0h5.086c.464 0 .909.184 1.237.513l3.414 3.414c.329.328.513.773.513 1.237v8.086A1.75 1.75 0 0112.25 15h-8.5A1.75 1.75 0 012 13.25V1.75z" fill="#8b949e"/></svg>';

// Color map for known top-level folders
const FOLDER_COLORS = {
  'Claude.AI': {fill:'#9FE1CB',stroke:'#0F6E56'},
  'Bot.Alexander': {fill:'#9FE1CB',stroke:'#0F6E56'},
  'Bot.Jiang': {fill:'#B5D4F4',stroke:'#185FA5'},
  'Bot.Replit': {fill:'#F4C0D1',stroke:'#993556'},
  'Bot.Trey': {fill:'#C0DD97',stroke:'#3B6D11'},
  'Velorin_Brain': {fill:'#AFA9EC',stroke:'#534AB7'},
  'Velorin_Mainframe': {fill:'#F4D9A0',stroke:'#8B6914'},
  'BOT.Alexander': {fill:'#9FE1CB',stroke:'#0F6E56'},
  'BOT.ClaudeBot': {fill:'#D4A0F4',stroke:'#7B2AB7'},
  'BOT.Gatekeeper': {fill:'#F4A0A0',stroke:'#B72A2A'},
  'CHAIRMAN_CONFIDENTIAL': {fill:'#F4A0A0',stroke:'#B72A2A'},
  'architecture': {fill:'#AFA9EC',stroke:'#534AB7'},
  'sessions': {fill:'#AFA9EC',stroke:'#534AB7'},
  'tools': {fill:'#AFA9EC',stroke:'#534AB7'},
};

function folderSvg(name) {
  const c = FOLDER_COLORS[name];
  if (c) return `<svg class="ficon" viewBox="0 0 16 16"><path d="M2 4a1 1 0 011-1h4l1 2h5a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V4z" fill="${c.fill}" stroke="${c.stroke}" stroke-width="0.5"/></svg>`;
  return FOLDER_SVG;
}

function buildTree(items) {
  // items: array of {path, type} from GitHub tree API
  const root = {};
  items.forEach(item => {
    const parts = item.path.split('/');
    let node = root;
    parts.forEach((part, i) => {
      if (!node[part]) node[part] = (i === parts.length - 1 && item.type === 'blob') ? null : {};
      if (node[part] !== null) node = node[part];
    });
  });
  return root;
}

function renderTree(tree, parentPath) {
  const container = document.createDocumentFragment();
  // Sort: folders first, then files, alphabetical within each group
  const entries = Object.entries(tree).sort((a, b) => {
    const aIsFolder = a[1] !== null;
    const bIsFolder = b[1] !== null;
    if (aIsFolder !== bIsFolder) return aIsFolder ? -1 : 1;
    return a[0].localeCompare(b[0], undefined, {sensitivity: 'base'});
  });

  entries.forEach(([name, subtree]) => {
    const fullPath = parentPath ? `${parentPath}/${name}` : name;
    if (subtree === null) {
      // File
      const div = document.createElement('div');
      div.className = 'file';
      const link = `https://github.com/${REPO}/blob/${BRANCH}/${encodeURIComponent(fullPath).replace(/%2F/g, '/')}`;
      div.innerHTML = `${FILE_SVG} <a href="${link}" target="_blank" rel="noopener">${name}</a>`;
      container.appendChild(div);
    } else {
      // Folder
      const folderDiv = document.createElement('div');
      folderDiv.className = 'folder';

      const toggle = document.createElement('button');
      toggle.className = 'folder-toggle';
      toggle.innerHTML = `<span class="arrow">▼</span> ${folderSvg(name)} ${name}`;
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('collapsed');
        childrenDiv.classList.toggle('hidden');
      });

      const childrenDiv = document.createElement('div');
      childrenDiv.className = 'children';
      childrenDiv.appendChild(renderTree(subtree, fullPath));

      folderDiv.appendChild(toggle);
      folderDiv.appendChild(childrenDiv);
      container.appendChild(folderDiv);
    }
  });

  return container;
}

function expandAll() {
  document.querySelectorAll('.folder-toggle.collapsed').forEach(el => {
    el.classList.remove('collapsed');
    el.nextElementSibling.classList.remove('hidden');
  });
}

function collapseAll() {
  document.querySelectorAll('.folder-toggle:not(.collapsed)').forEach(el => {
    el.classList.add('collapsed');
    el.nextElementSibling.classList.add('hidden');
  });
}

async function fetchTree() {
  const statusLine = document.getElementById('statusLine');
  const container = document.getElementById('treeContainer');
  const countDisplay = document.getElementById('countDisplay');
  const updatedLine = document.getElementById('updatedLine');

  statusLine.innerHTML = '<span class="dot loading"></span> Fetching repository tree...';
  container.innerHTML = '<div style="color:#7d8590;font-size:12px;padding:8px">Loading...</div>';

  try {
    const resp = await fetch(`${API_BASE}/repos/${REPO}/git/trees/${BRANCH}?recursive=1`);
    if (!resp.ok) throw new Error(`GitHub API returned ${resp.status}`);
    const data = await resp.json();

    if (data.truncated) {
      statusLine.innerHTML = '<span class="dot loading"></span> Tree was truncated by GitHub API — large repo. Showing partial results.';
    }

    const items = data.tree.filter(item => item.type === 'blob' || item.type === 'tree');
    const tree = buildTree(items);

    const fileCount = items.filter(i => i.type === 'blob').length;
    const folderCount = items.filter(i => i.type === 'tree').length;

    container.innerHTML = '';
    container.appendChild(renderTree(tree, ''));

    countDisplay.textContent = `${fileCount} files, ${folderCount} folders`;
    statusLine.innerHTML = '<span class="dot ok"></span> Live — loaded from GitHub API';
    updatedLine.textContent = `Last fetched: ${new Date().toLocaleString()}`;

  } catch (err) {
    statusLine.innerHTML = `<span class="dot err"></span> Error: ${err.message}`;
    container.innerHTML = `<div class="error-msg">Failed to load repository tree.<br>This page uses the public GitHub API. If the repo is private, the tree cannot be fetched without authentication.<br><br>Error: ${err.message}</div>`;
  }
}

// Auto-fetch on load
fetchTree();
</script>

</body>
</html>
